<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NextOri — Trouve la voie qui te correspond</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#1B2A4A;
    --navy-2:#152140;
    --gold:#F5A623;
    --gold-dark:#E2960F;
    --bg:#F4F5F8;
    --card:#FFFFFF;
    --text-gray:#6B7280;
    --text-dark:#1B2A4A;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  body{
    background:var(--bg);
    font-family:'Inter', sans-serif;
    display:flex;
    justify-content:center;
    padding:24px 12px;
  }

  .phone{
    width:100%;
    max-width:400px;
    background:var(--bg);
  }

  /* ---------- HEADER / LOGO ---------- */
  .header{
    text-align:center;
    padding:24px 0 8px;
  }

  .logo-badge{
    width:70px;
    height:70px;
    border-radius:50%;
    background:var(--navy);
    display:flex;
    align-items:center;
    justify-content:center;
    margin:0 auto 14px;
    box-shadow:0 8px 20px rgba(27,42,74,0.25);
  }

  .logo-badge svg{ width:34px; height:34px; }

  .wordmark{
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size:34px;
    letter-spacing:-0.5px;
    color:var(--navy);
    margin-bottom:10px;
  }
  .wordmark span{ color:var(--gold); }

  .tagline-row{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    color:var(--text-gray);
    font-size:13.5px;
    line-height:1.4;
    padding:0 30px;
  }
  .tagline-row .line{
    width:22px;
    height:2px;
    background:var(--gold);
    flex-shrink:0;
    border-radius:2px;
  }

  /* ---------- HERO ILLUSTRATION ---------- */
  .hero-frame{
    margin:22px 0 26px;
    border-radius:20px;
    overflow:hidden;
    border:3px solid var(--navy);
    box-shadow:0 10px 24px rgba(27,42,74,0.15);
  }

  .hero-illustration{
    width:100%;
    height:260px;
    display:block;
  }

  /* ---------- TEXT BLOCK ---------- */
  .headline{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:26px;
    line-height:1.25;
    text-align:center;
    color:var(--navy);
    padding:0 8px;
    margin-bottom:14px;
  }

  .subtext{
    text-align:center;
    color:var(--text-gray);
    font-size:14.5px;
    line-height:1.6;
    padding:0 14px;
    margin-bottom:26px;
  }

  /* ---------- FEATURE CARDS ---------- */
  .features{
    display:flex;
    gap:10px;
    margin-bottom:26px;
  }

  .feature-card{
    flex:1;
    background:var(--card);
    border-radius:16px;
    padding:18px 8px 14px;
    text-align:center;
    box-shadow:0 4px 14px rgba(27,42,74,0.06);
  }

  .feature-icon{
    width:42px;
    height:42px;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:0 auto 10px;
  }
  .feature-icon svg{ width:20px; height:20px; }

  .icon-gold{ background:linear-gradient(135deg,#FFD166,var(--gold)); }
  .icon-orange{ background:linear-gradient(135deg,#FF8A5B,#E8562E); }
  .icon-navy{ background:linear-gradient(135deg,#2E436B,var(--navy)); }

  .feature-label{
    font-size:12.5px;
    font-weight:700;
    color:var(--navy);
    line-height:1.3;
  }

  /* ---------- BUTTONS ---------- */
  .btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    width:100%;
    border:none;
    border-radius:14px;
    font-family:'Inter', sans-serif;
    font-weight:700;
    font-size:15px;
    padding:16px;
    cursor:pointer;
    margin-bottom:12px;
    transition:transform 0.15s ease, box-shadow 0.15s ease;
  }
  .btn:hover{ transform:translateY(-1px); }
  .btn:focus-visible{ outline:3px solid #8AB4FF; outline-offset:2px; }

  .btn-primary{
    background:var(--gold);
    color:var(--navy-2);
    box-shadow:0 8px 18px rgba(245,166,35,0.35);
  }
  .btn-primary:hover{ background:var(--gold-dark); }

  .btn-secondary{
    background:var(--navy);
    color:#FFFFFF;
    box-shadow:0 8px 18px rgba(27,42,74,0.2);
  }
  .btn-secondary:hover{ background:var(--navy-2); }

  /* ---------- FOOTER NOTE ---------- */
  .footnote{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    color:var(--text-gray);
    font-size:12.5px;
    padding:6px 0 20px;
  }
  .footnote svg{ width:13px; height:13px; }

  @media (prefers-reduced-motion: reduce){
    .btn{ transition:none; }
  }
</style>
</head>
<body>

<div class="phone">

  <!-- HEADER -->
  <div class="header">
    <div class="logo-badge">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M12 3L2 8l10 5 8-4.2V15h1.5V8L12 3z" fill="#F5A623"/>
        <path d="M6 11.5V16c0 1.5 2.7 3 6 3s6-1.5 6-3v-4.5l-6 3.15-6-3.15z" fill="#F5A623"/>
      </svg>
    </div>
    <div class="wordmark">Next<span>Ori</span></div>
    <div class="tagline-row">
      <span class="line"></span>
      <span>Des choix éclairés pour un avenir meilleur.</span>
      <span class="line"></span>
    </div>
  </div>

  <!-- HERO -->
  <div class="hero-frame">
    <svg class="hero-illustration" viewBox="0 0 400 260" preserveAspectRatio="xMidYMid slice">
      <defs>
        <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#7B8AA0"/>
          <stop offset="60%" stop-color="#A9B4C4"/>
          <stop offset="100%" stop-color="#C9CFDA"/>
        </linearGradient>
        <linearGradient id="hillFar" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#8E9CAE"/>
          <stop offset="100%" stop-color="#7A889C"/>
        </linearGradient>
        <linearGradient id="hillNear" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#6E6155"/>
          <stop offset="100%" stop-color="#584E44"/>
        </linearGradient>
        <linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#B9AE9C"/>
          <stop offset="100%" stop-color="#9C8F7B"/>
        </linearGradient>
      </defs>

      <!-- sky -->
      <rect x="0" y="0" width="400" height="260" fill="url(#sky)"/>

      <!-- clouds -->
      <ellipse cx="80" cy="45" rx="55" ry="14" fill="#9AA6B6" opacity="0.6"/>
      <ellipse cx="300" cy="30" rx="70" ry="16" fill="#9AA6B6" opacity="0.5"/>
      <ellipse cx="200" cy="60" rx="90" ry="12" fill="#B0BAC8" opacity="0.5"/>

      <!-- far hills -->
      <path d="M0,150 Q100,110 200,140 T400,130 V260 H0 Z" fill="url(#hillFar)"/>
      <!-- near hills -->
      <path d="M0,180 Q120,150 220,175 T400,165 V260 H0 Z" fill="url(#hillNear)"/>

      <!-- forked road: left branch -->
      <path d="M200,260 L150,150 Q120,110 60,90 L40,80 L70,95 Q130,118 165,155 Z" fill="url(#road)" opacity="0.95"/>
      <!-- forked road: right branch -->
      <path d="M200,260 L250,150 Q280,110 340,90 L360,80 L330,95 Q270,118 235,155 Z" fill="url(#road)" opacity="0.95"/>

      <!-- figure silhouette -->
      <g transform="translate(200,210)">
        <ellipse cx="0" cy="46" rx="14" ry="4" fill="#00000022"/>
        <path d="M-3,-38 q3,-6 8,-2 q4,4 1,9 q5,2 5,9 l1,14 q0,4 -3,4 l-2,10 h4 l3,24 h-7 l-2,-20 -2,20 h-7 l2,-24 h4 l-2,-10 q-3,0 -3,-4 l1,-13 q0,-7 5,-9 q-4,-2 -3,-8 Z" fill="#2B2620"/>
        <path d="M6,-33 q6,-2 8,3" stroke="#2B2620" stroke-width="3" fill="none" stroke-linecap="round"/>
      </g>
    </svg>
  </div>

  <!-- HEADLINE -->
  <div class="headline">Trouve la voie qui te correspond</div>
  <div class="subtext">
    Passe un test intelligent basé sur le modèle RIASEC et découvre les carrières les plus adaptées à ton profil.
  </div>

  <!-- FEATURES -->
  <div class="features">
    <div class="feature-card">
      <div class="feature-icon icon-gold">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 2l1.6 5.2L19 9l-5.4 1.8L12 16l-1.6-5.2L5 9l5.4-1.8L12 2z" fill="#1B2A4A"/></svg>
      </div>
      <div class="feature-label">Test<br>personnalisé</div>
    </div>
    <div class="feature-card">
      <div class="feature-icon icon-orange">
        <svg viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="9" stroke="#FFFFFF" stroke-width="2"/>
          <circle cx="12" cy="12" r="5" stroke="#FFFFFF" stroke-width="2"/>
          <circle cx="12" cy="12" r="1.5" fill="#FFFFFF"/>
        </svg>
      </div>
      <div class="feature-label">100+<br>carrières</div>
    </div>
    <div class="feature-card">
      <div class="feature-icon icon-navy">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M12 3L2 8l10 5 8-4.2V15h1.5V8L12 3z" fill="#FFFFFF"/>
          <path d="M6 11.5V16c0 1.5 2.7 3 6 3s6-1.5 6-3v-4.5l-6 3.15-6-3.15z" fill="#FFFFFF"/>
        </svg>
      </div>
      <div class="feature-label">Universités<br>SN</div>
    </div>
  </div>

  <!-- CTA -->
  <button class="btn btn-primary">Commencer le test →</button>
  <button class="btn btn-secondary">Explorer la plateforme</button>

  <!-- FOOTNOTE -->
  <div class="footnote">
    <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="#6B7280" stroke-width="2"/><path d="M12 7v5l3 3" stroke="#6B7280" stroke-width="2" stroke-linecap="round"/></svg>
    <span>Test RIASEC · 10 min · 100% gratuit</span>
  </div>

</div>

</body>
</html>
