<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NextOri — Home</title>
  <link rel="stylesheet" href="css/landing.css" />
  <link rel="stylesheet" href="css/home.css" />
</head>
<body>
  <div class="home-shell">
    <header class="home-header">
      <div class="home-header-inner">
        <div class="home-brand">
          <div class="home-brand-mark">🎓</div>
          <div class="home-brand-copy">
            <div class="home-brand-name"><span class="home-brand-next">Next</span><span class="home-brand-ori">Ori</span></div>
            <div class="home-brand-sub">Des choix éclairés</div>
          </div>
        </div>
        <div class="home-actions">
          <div class="home-pill home-pill-gold">
            <span class="pill-icon">🏆</span>
            <span>50 pts <small>Niv. 1</small></span>
          </div>
          <button class="home-pill home-pill-dark" aria-label="Messages">
            <span class="pill-icon">💬</span>
          </button>
        </div>
      </div>
    </header>
    <main class="home-main">
      <section class="dashboard-panel">
        <div class="dashboard-panel-top">
          <div>
            <p class="dashboard-label">Tableau de bord</p>
            <h1 class="dashboard-title">Next<span class="dashboard-title-highlight">Ori</span></h1>
          </div>
          <div class="dashboard-stat-bubble">
            <span class="bubble-icon">🏆</span>
            <span>50 pts</span>
            <small>Niv. 1</small>
          </div>
        </div>
        <div class="dashboard-card">
          <div class="dashboard-card-header">
            <div>
              <p class="card-label">Niveau 1</p>
              <p class="card-meta">50 points pour niveau 2</p>
            </div>
            <div class="card-value">50 pts</div>
          </div>
          <div class="progress-bar">
            <span class="progress-fill" style="width: 50%;"></span>
          </div>
        </div>
        <div class="dashboard-stats-grid">
          <div class="stat-card">
            <div class="stat-icon">🔥</div>
            <div>
              <div class="stat-value">3</div>
              <div class="stat-label">Jours d'affilée</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">⭐</div>
            <div>
              <div class="stat-value">1</div>
              <div class="stat-label">Badges gagnés</div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
